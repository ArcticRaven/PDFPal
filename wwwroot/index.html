<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>PDF Pal</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #0d0e11;
    --surface:   #13151a;
    --border:    #1f2330;
    --border-hi: #2e3347;
    --text:      #c8cdd8;
    --text-dim:  #5a6175;
    --text-hi:   #eef0f5;
    --accent:    #4f8ef7;
    --accent-dim:#1e3a6e;
    --ok:        #3ecf8e;
    --warn:      #f7a94f;
    --err:       #f7524f;
    --mono:      'IBM Plex Mono', monospace;
    --sans:      'IBM Plex Sans', sans-serif;
  }

  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--sans); font-size: 14px; line-height: 1.6; overflow: hidden; }

  /* ── Layout ── */
  #app {
    display: grid;
    grid-template-columns: 260px 1fr 400px;
    grid-template-rows: 48px 1fr;
    height: 100vh;
  }

  /* ── Header ── */
  header {
    grid-column: 1 / -1;
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 0 20px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
  }

  .logo { font-family: var(--mono); font-size: 13px; font-weight: 500; color: var(--text-hi); letter-spacing: 0.08em; }
  .logo span { color: var(--accent); }

  .btn-header {
    background: none;
    border: 1px solid var(--border-hi);
    border-radius: 4px;
    color: var(--text-dim);
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.06em;
    padding: 4px 10px;
    cursor: pointer;
    transition: color 0.2s, border-color 0.2s;
  }
  .btn-header:hover { color: var(--text-hi); border-color: var(--accent); }
  #btn-new-session  { margin-left: auto; }
  #btn-toggle-debug { }

  .status-pill { display: flex; align-items: center; gap: 6px; font-family: var(--mono); font-size: 11px; color: var(--text-dim); }
  .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--text-dim); transition: background 0.4s; }
  .dot.ok   { background: var(--ok);  box-shadow: 0 0 6px var(--ok); }
  .dot.warn { background: var(--warn); }
  .dot.err  { background: var(--err); }

  /* ── Sidebar ── */
  aside {
    border-right: 1px solid var(--border);
    background: var(--surface);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .sidebar-section { padding: 16px; border-bottom: 1px solid var(--border); }

  .sidebar-label {
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 500;
    color: var(--text-dim);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-bottom: 12px;
  }

  #drop-zone {
    border: 1px dashed var(--border-hi);
    border-radius: 6px;
    padding: 20px 14px;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
    position: relative;
  }
  #drop-zone:hover, #drop-zone.drag-over { border-color: var(--accent); background: rgba(79,142,247,0.04); }
  #drop-zone input[type="file"] { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
  #drop-zone .dz-icon { font-size: 20px; margin-bottom: 6px; opacity: 0.5; }
  #drop-zone p { font-size: 11px; color: var(--text-dim); }
  #drop-zone strong { color: var(--text); font-weight: 400; }

  #progress-wrap { display: none; margin-top: 10px; }
  #progress-wrap.visible { display: block; }
  .progress-label { display: flex; justify-content: space-between; font-family: var(--mono); font-size: 10px; color: var(--text-dim); margin-bottom: 4px; }
  .progress-bar   { height: 2px; background: var(--border-hi); border-radius: 2px; overflow: hidden; }
  .progress-fill  { height: 100%; background: var(--accent); width: 0%; transition: width 0.3s ease; }

  /* Doc list */
  #doc-list-section { flex: 1; display: flex; flex-direction: column; overflow: hidden; padding: 16px; }
  #doc-list { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 5px; margin-top: 4px; }
  #doc-list::-webkit-scrollbar { width: 3px; }
  #doc-list::-webkit-scrollbar-thumb { background: var(--border-hi); border-radius: 2px; }

  .no-docs-hint { font-family: var(--mono); font-size: 11px; color: var(--text-dim); padding: 8px 0; text-align: center; }

  .doc-item { display: flex; align-items: flex-start; gap: 8px; padding: 7px 9px; border: 1px solid var(--border); border-radius: 5px; background: rgba(79,142,247,0.03); transition: border-color 0.15s; }
  .doc-item:hover { border-color: var(--border-hi); }
  .doc-item-body { flex: 1; min-width: 0; }
  .doc-item-name { font-family: var(--mono); font-size: 11px; color: var(--text-hi); word-break: break-all; line-height: 1.4; }
  .doc-item-meta { font-family: var(--mono); font-size: 10px; color: var(--text-dim); margin-top: 2px; }
  .doc-item-delete { background: none; border: none; color: var(--text-dim); font-size: 12px; cursor: pointer; padding: 0 2px; flex-shrink: 0; margin-top: 1px; transition: color 0.15s; }
  .doc-item-delete:hover { color: var(--err); }

  /* Model info */
  .sidebar-section #model-info { font-family: var(--mono); font-size: 11px; color: var(--text-dim); }
  .model-tag { display: inline-block; margin: 2px 2px 2px 0; padding: 2px 6px; border: 1px solid var(--border-hi); border-radius: 3px; font-size: 10px; color: var(--text); }
  .model-tag.active-model { border-color: var(--accent); color: var(--accent); }

  /* ── Chat panel ── */
  main { display: flex; flex-direction: column; overflow: hidden; background: var(--bg); border-right: 1px solid var(--border); }

  #messages { flex: 1; overflow-y: auto; padding: 20px 24px; display: flex; flex-direction: column; gap: 18px; scroll-behavior: smooth; }
  #messages::-webkit-scrollbar { width: 4px; }
  #messages::-webkit-scrollbar-thumb { background: var(--border-hi); border-radius: 2px; }

  #empty-state { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; color: var(--text-dim); text-align: center; pointer-events: none; }
  #empty-state.hidden { display: none; }
  #empty-state .big-icon { font-size: 36px; opacity: 0.3; }
  #empty-state p { font-size: 13px; max-width: 260px; line-height: 1.8; }

  /* Debug drawer */
  #debug-drawer {
    display: none;
    border-top: 1px solid var(--border);
    background: var(--surface);
    padding: 10px 16px;
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text-dim);
    max-height: 160px;
    overflow-y: auto;
    line-height: 1.7;
  }
  #debug-drawer.visible { display: block; }
  #debug-drawer .debug-row { display: flex; gap: 8px; flex-wrap: wrap; }
  #debug-drawer .debug-key { color: var(--accent); }
  #debug-drawer .debug-tag { background: var(--border); border: 1px solid var(--border-hi); border-radius: 3px; padding: 1px 5px; margin: 1px; display: inline-block; }

  /* Messages */
  .msg { display: flex; gap: 10px; max-width: 760px; animation: fadeUp 0.2s ease; }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
  .msg.user { align-self: flex-end; flex-direction: row-reverse; }

  .msg-avatar { width: 26px; height: 26px; border-radius: 4px; display: flex; align-items: center; justify-content: center; font-family: var(--mono); font-size: 10px; flex-shrink: 0; }
  .msg.user      .msg-avatar { background: var(--accent-dim); color: var(--accent); border: 1px solid var(--accent-dim); }
  .msg.assistant .msg-avatar { background: var(--border); color: var(--text-dim); border: 1px solid var(--border-hi); }

  .msg-body { display: flex; flex-direction: column; gap: 5px; }
  .msg-content { padding: 9px 13px; border-radius: 6px; font-size: 13px; line-height: 1.7; }
  .msg.user      .msg-content { background: var(--accent-dim); color: var(--text-hi); border: 1px solid rgba(79,142,247,0.2); border-top-right-radius: 2px; }
  .msg.assistant .msg-content { background: var(--surface); color: var(--text); border: 1px solid var(--border); border-top-left-radius: 2px; }

  .msg-sources { display: flex; flex-wrap: wrap; gap: 4px; padding-left: 2px; }
  .source-tag {
    font-family: var(--mono); font-size: 10px; padding: 2px 7px;
    border-radius: 3px; background: var(--border); color: var(--text-dim);
    border: 1px solid var(--border-hi); white-space: nowrap;
    cursor: pointer; transition: color 0.15s, border-color 0.15s;
  }
  .source-tag:hover { color: var(--accent); border-color: var(--accent); }

  .thinking { display: flex; gap: 4px; padding: 10px 13px; align-items: center; }
  .thinking .dot-wrap { display: flex; gap: 4px; align-items: center; flex-shrink: 0; }
  .thinking .dot-wrap span { width: 5px; height: 5px; border-radius: 50%; background: var(--text-dim); animation: pulse 1.2s infinite; }
  .thinking .dot-wrap span:nth-child(2) { animation-delay: 0.2s; }
  .thinking .dot-wrap span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes pulse { 0%,100% { opacity: 0.3; transform: scale(0.8); } 50% { opacity: 1; transform: scale(1); } }
  .thinking-status {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text-dim);
    margin-left: 8px;
    opacity: 0.8;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 340px;
    transition: opacity 0.3s;
  }

  #input-bar { border-top: 1px solid var(--border); padding: 12px 18px; background: var(--surface); display: flex; gap: 8px; align-items: flex-end; }
  #chat-input { flex: 1; background: var(--bg); border: 1px solid var(--border-hi); border-radius: 6px; padding: 9px 13px; color: var(--text-hi); font-family: var(--sans); font-size: 13px; line-height: 1.5; resize: none; min-height: 40px; max-height: 130px; outline: none; transition: border-color 0.2s; }
  #chat-input:focus { border-color: var(--accent); }
  #chat-input::placeholder { color: var(--text-dim); }
  #chat-input:disabled { opacity: 0.4; cursor: not-allowed; }

  #send-btn { background: var(--accent); border: none; border-radius: 6px; width: 40px; height: 40px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: opacity 0.2s, transform 0.1s; color: white; }
  #send-btn:hover:not(:disabled) { opacity: 0.85; }
  #send-btn:active:not(:disabled) { transform: scale(0.95); }
  #send-btn:disabled { opacity: 0.3; cursor: not-allowed; }
  #send-btn svg { width: 15px; height: 15px; }

  /* ── PDF viewer panel ── */
  #pdf-panel {
    display: flex;
    flex-direction: column;
    overflow: hidden;
    background: var(--bg);
    position: relative;
    min-width: 240px;
  }

  /* Drag-resize handle on the left edge of the PDF panel */
  #pdf-resizer {
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 4px;
    cursor: col-resize;
    z-index: 10;
    background: transparent;
    transition: background 0.15s;
  }
  #pdf-resizer:hover, #pdf-resizer.dragging { background: var(--accent); opacity: 0.45; }

  /* Tabs */
  #pdf-tabs-bar {
    display: flex;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    overflow-x: auto;
    min-height: 34px;
    flex-shrink: 0;
  }
  #pdf-tabs-bar::-webkit-scrollbar { height: 2px; }
  #pdf-tabs-bar::-webkit-scrollbar-thumb { background: var(--border-hi); }

  .pdf-tab {
    padding: 0 14px;
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text-dim);
    cursor: pointer;
    border-right: 1px solid var(--border);
    white-space: nowrap;
    display: flex;
    align-items: center;
    transition: color 0.15s, background 0.15s;
    min-width: 0;
    max-width: 160px;
  }
  .pdf-tab span { overflow: hidden; text-overflow: ellipsis; }
  .pdf-tab:hover { color: var(--text); background: rgba(255,255,255,0.03); }
  .pdf-tab.active { color: var(--text-hi); background: var(--bg); border-bottom: 2px solid var(--accent); }

  /* Page nav */
  #pdf-nav {
    display: none;
    align-items: center;
    justify-content: center;
    gap: 14px;
    padding: 6px 12px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
  }
  #pdf-nav.visible { display: flex; }
  .pdf-nav-btn { background: none; border: 1px solid var(--border-hi); border-radius: 4px; color: var(--text-dim); font-family: var(--mono); font-size: 13px; width: 26px; height: 22px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: color 0.15s, border-color 0.15s; }
  .pdf-nav-btn:hover:not(:disabled) { color: var(--text-hi); border-color: var(--text-dim); }
  .pdf-nav-btn:disabled { opacity: 0.3; cursor: default; }
  #pdf-page-label { font-family: var(--mono); font-size: 10px; color: var(--text-dim); min-width: 60px; text-align: center; }

  /* Canvas scroll area */
  #pdf-scroll { flex: 1; overflow: auto; display: flex; justify-content: center; align-items: flex-start; padding: 16px; }
  #pdf-scroll::-webkit-scrollbar { width: 5px; height: 5px; }
  #pdf-scroll::-webkit-scrollbar-thumb { background: var(--border-hi); border-radius: 3px; }

  #pdf-canvas-wrap { position: relative; flex-shrink: 0; }
  #pdf-canvas { display: block; box-shadow: 0 4px 24px rgba(0,0,0,0.5); border-radius: 2px; }

  /* Highlight overlay */
  #pdf-hl {
    display: none;
    position: absolute;
    left: 0;
    background: rgba(255, 210, 50, 0.22);
    border-left: 3px solid rgba(255, 210, 50, 0.7);
    pointer-events: none;
    border-radius: 0 2px 2px 0;
    transition: top 0.2s ease, height 0.2s ease;
  }

  /* Empty state for viewer */
  #pdf-empty {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
    color: var(--text-dim);
    font-size: 12px;
    font-family: var(--mono);
  }
  #pdf-empty .pdf-empty-icon { font-size: 32px; opacity: 0.15; }

  /* ── Toast ── */
  #toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px); background: var(--surface); border: 1px solid var(--border-hi); border-radius: 6px; padding: 9px 16px; font-family: var(--mono); font-size: 11px; color: var(--text); transition: transform 0.3s ease; z-index: 100; white-space: nowrap; }
  #toast.show { transform: translateX(-50%) translateY(0); }
  #toast.err  { border-color: var(--err); color: var(--err); }
</style>
</head>
<body>
<div id="app">

  <!-- Header -->
  <header>
    <div class="logo"><span>PDF</span>PAL</div>
    <button class="btn-header" id="btn-new-session"  onclick="newSession()">+ New Session</button>
    <button class="btn-header" id="btn-toggle-debug" onclick="toggleDebug()">debug</button>
    <div class="status-pill">
      <div class="dot" id="ollama-dot"></div>
      <span id="ollama-label">connecting…</span>
    </div>
  </header>

  <!-- ── Sidebar ── -->
  <aside>
    <div class="sidebar-section">
      <div class="sidebar-label">Upload PDF</div>
      <div id="drop-zone">
        <input type="file" accept=".pdf" id="file-input" />
        <div class="dz-icon">📄</div>
        <p><strong>Drop PDF here</strong><br>or click to browse</p>
      </div>
      <div id="progress-wrap">
        <div class="progress-label">
          <span id="progress-status">Processing…</span>
          <span id="progress-pct">0%</span>
        </div>
        <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
      </div>
    </div>

    <div id="doc-list-section">
      <div class="sidebar-label">Documents</div>
      <div id="doc-list">
        <div class="no-docs-hint" id="no-docs-hint">No documents loaded yet</div>
      </div>
    </div>

    <div class="sidebar-section">
      <div class="sidebar-label">Models</div>
      <div id="model-info"><span style="color:var(--text-dim);font-size:11px">Loading…</span></div>
    </div>
  </aside>

  <!-- ── Chat panel ── -->
  <main>
    <div id="messages">
      <div id="empty-state">
        <div class="big-icon">🔍</div>
        <p>Load one or more PDFs, then ask anything about them.</p>
      </div>
    </div>

    <!-- Debug drawer (hidden by default) -->
    <div id="debug-drawer"></div>

    <div id="input-bar">
      <textarea id="chat-input" placeholder="Ask about your documents…" rows="1" disabled></textarea>
      <button id="send-btn" disabled onclick="sendMessage()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="22" y1="2" x2="11" y2="13"></line>
          <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
        </svg>
      </button>
    </div>
  </main>

  <!-- ── PDF viewer panel ── -->
  <div id="pdf-panel">
    <div id="pdf-resizer"></div>
    <div id="pdf-tabs-bar"></div>

    <div id="pdf-nav">
      <button class="pdf-nav-btn" id="btn-prev" onclick="prevPage()">‹</button>
      <span id="pdf-page-label">— / —</span>
      <button class="pdf-nav-btn" id="btn-next" onclick="nextPage()">›</button>
    </div>

    <div id="pdf-scroll" style="display:none">
      <div id="pdf-canvas-wrap">
        <canvas id="pdf-canvas"></canvas>
        <div id="pdf-hl"></div>
      </div>
    </div>

    <div id="pdf-empty">
      <div class="pdf-empty-icon">📄</div>
      <span>Load a PDF to preview it here</span>
    </div>
  </div>

</div>

<div id="toast"></div>

<script>
// ── PDF.js setup ───────────────────────────────────────────────────────────
pdfjsLib.GlobalWorkerOptions.workerSrc =
  'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

// ── App state ──────────────────────────────────────────────────────────────
let documents      = [];
let isStreaming    = false;
let progressPoller = null;
let debugVisible   = false;

// PDF viewer state
let pdfCache       = {};   // docId → PDFDocumentProxy
let activePdfId    = null;
let activePdfPage  = 1;
let activePdfTotal = 1;

// ── Status polling ─────────────────────────────────────────────────────────
async function pollStatus() {
  try {
    const res  = await fetch('/api/status');
    const data = await res.json();
    const dot  = document.getElementById('ollama-dot');
    const lbl  = document.getElementById('ollama-label');
    dot.className     = data.ollamaReady ? 'dot ok' : 'dot warn';
    lbl.textContent   = data.ollamaReady
      ? `ollama · ${data.activeModel ?? 'unknown'}`
      : 'ollama connecting…';
    const mi = document.getElementById('model-info');
    mi.innerHTML = data.models?.length
      ? data.models.map(m => {
          const active = m === data.activeModel || (data.activeModel && m.startsWith(data.activeModel));
          return `<span class="model-tag${active ? ' active-model' : ''}">${m}</span>`;
        }).join('')
      : '<span style="color:var(--text-dim);font-size:11px">No models found</span>';
  } catch {
    document.getElementById('ollama-dot').className = 'dot err';
    document.getElementById('ollama-label').textContent = 'ollama offline';
  }
}
setInterval(pollStatus, 5000);
pollStatus();

// ── Document list ──────────────────────────────────────────────────────────
async function fetchDocuments() {
  try {
    const res  = await fetch('/api/documents');
    documents  = await res.json();
    renderDocList();
    renderPdfTabs();
    setInputEnabled(documents.length > 0);
  } catch { /* server starting */ }
}

function renderDocList() {
  const list = document.getElementById('doc-list');
  [...list.querySelectorAll('.doc-item')].forEach(el => el.remove());
  document.getElementById('no-docs-hint').style.display = documents.length ? 'none' : '';
  documents.forEach(doc => {
    const item = document.createElement('div');
    item.className  = 'doc-item';
    item.dataset.id = doc.id;
    item.innerHTML  = `
      <div class="doc-item-body">
        <div class="doc-item-name">${escHtml(doc.filename)}</div>
        <div class="doc-item-meta">${doc.chunkCount} chunks</div>
      </div>
      <button class="doc-item-delete" title="Remove" onclick="deleteDocument(${doc.id})">✕</button>`;
    document.getElementById('doc-list').appendChild(item);
  });
}

async function deleteDocument(id) {
  try {
    await fetch(`/api/documents/${id}`, { method: 'DELETE' });
    delete pdfCache[id];
    if (activePdfId === id) { activePdfId = null; showPdfEmpty(); }
    await fetchDocuments();
    showToast('Document removed');
  } catch { showToast('Failed to remove document', true); }
}

// ── PDF tabs ───────────────────────────────────────────────────────────────
function renderPdfTabs() {
  const bar = document.getElementById('pdf-tabs-bar');
  bar.innerHTML = '';
  documents.forEach(doc => {
    const tab = document.createElement('div');
    tab.className      = 'pdf-tab' + (doc.id === activePdfId ? ' active' : '');
    tab.dataset.docId  = doc.id;
    tab.title          = doc.filename;
    tab.innerHTML      = `<span>${escHtml(doc.filename)}</span>`;
    tab.onclick        = () => openPdfTab(doc.id);
    bar.appendChild(tab);
  });
}

async function openPdfTab(docId) {
  activePdfId   = docId;
  activePdfPage = 1;
  renderPdfTabs();
  await renderPdf();
}

// ── PDF rendering ──────────────────────────────────────────────────────────
async function ensurePdfLoaded(docId) {
  if (pdfCache[docId]) return;
  const res    = await fetch(`/api/documents/${docId}/file`);
  const buf    = await res.arrayBuffer();
  pdfCache[docId] = await pdfjsLib.getDocument({ data: buf }).promise;
}

async function renderPdf(highlightYStart, highlightYEnd) {
  if (!activePdfId) return;
  try {
    await ensurePdfLoaded(activePdfId);
    const pdf      = pdfCache[activePdfId];
    activePdfTotal = pdf.numPages;

    const page     = await pdf.getPage(activePdfPage);

    // Fit PDF to the available scroll area width (minus 32px padding)
    const scrollEl  = document.getElementById('pdf-scroll');
    const availW    = Math.max(200, scrollEl.clientWidth - 32);
    const naturalVP = page.getViewport({ scale: 1.0 });
    const scale     = Math.min(3.0, availW / naturalVP.width);
    const viewport  = page.getViewport({ scale });

    const canvas   = document.getElementById('pdf-canvas');
    canvas.width   = viewport.width;
    canvas.height  = viewport.height;

    await page.render({ canvasContext: canvas.getContext('2d'), viewport }).promise;

    // Update nav
    document.getElementById('pdf-page-label').textContent = `${activePdfPage} / ${activePdfTotal}`;
    document.getElementById('btn-prev').disabled = activePdfPage <= 1;
    document.getElementById('btn-next').disabled = activePdfPage >= activePdfTotal;
    document.getElementById('pdf-nav').classList.add('visible');

    // Show canvas, hide empty
    document.getElementById('pdf-scroll').style.display = '';
    document.getElementById('pdf-empty').style.display  = 'none';

    // Highlight
    clearHighlight();
    if (highlightYStart !== undefined) applyHighlight(highlightYStart, highlightYEnd, canvas.height);
  } catch (e) {
    console.error('PDF render error', e);
  }
}

function applyHighlight(yStart, yEnd, canvasHeight) {
  const hl     = document.getElementById('pdf-hl');
  const canvas = document.getElementById('pdf-canvas');
  const pad    = 4; // px padding above/below
  hl.style.top    = Math.max(0, yStart * canvasHeight - pad) + 'px';
  hl.style.height = Math.max(20, (yEnd - yStart) * canvasHeight + pad * 2) + 'px';
  hl.style.width  = canvas.width + 'px';
  hl.style.display = 'block';
  // Scroll the highlight into view within the pdf-scroll container
  setTimeout(() => hl.scrollIntoView({ behavior: 'smooth', block: 'center' }), 100);
}

function clearHighlight() { document.getElementById('pdf-hl').style.display = 'none'; }

function showPdfEmpty() {
  document.getElementById('pdf-scroll').style.display = 'none';
  document.getElementById('pdf-nav').classList.remove('visible');
  document.getElementById('pdf-empty').style.display = '';
}

async function prevPage() { if (activePdfPage > 1)            { activePdfPage--; await renderPdf(); } }
async function nextPage() { if (activePdfPage < activePdfTotal){ activePdfPage++; await renderPdf(); } }

// Navigate to a specific source from a citation tag click
async function goToSource(docId, page, yStart, yEnd) {
  if (activePdfId !== docId) {
    activePdfId   = docId;
    activePdfPage = page;
    renderPdfTabs();
  } else {
    activePdfPage = page;
  }
  await renderPdf(yStart, yEnd);
}

// ── New session ────────────────────────────────────────────────────────────
async function newSession() {
  try {
    await fetch('/api/session/new', { method: 'POST' });
    documents = [];
    pdfCache  = {};
    activePdfId = null;
    renderDocList();
    renderPdfTabs();
    showPdfEmpty();
    setInputEnabled(false);
    document.querySelectorAll('#messages .msg').forEach(el => el.remove());
    document.getElementById('empty-state').classList.remove('hidden');
    document.getElementById('debug-drawer').innerHTML = '';
    document.getElementById('debug-drawer').classList.remove('visible');
    showToast('New session started');
  } catch { showToast('Failed to start new session', true); }
}

// ── Debug drawer ───────────────────────────────────────────────────────────
function toggleDebug() {
  debugVisible = !debugVisible;
  document.getElementById('btn-toggle-debug').style.borderColor = debugVisible ? 'var(--accent)' : '';
  document.getElementById('btn-toggle-debug').style.color       = debugVisible ? 'var(--accent)' : '';
  // The drawer itself becomes visible once a debug event arrives
}

function renderDebug(d) {
  if (!debugVisible) return;
  const drawer = document.getElementById('debug-drawer');
  drawer.classList.add('visible');

  const kws = [...d.keywords, ...d.variants].map(t => `<span class="debug-tag">${escHtml(t)}</span>`).join('');
  const chunks = d.topChunks.map(c =>
    `<span class="debug-tag">(${c.index}) ${escHtml(c.doc)} pg.${c.page}</span>`).join('');

  drawer.innerHTML = `
    <div class="debug-row">
      <span class="debug-key">keywords</span> ${kws || '<span style="opacity:.5">none</span>'}
    </div>
    <div class="debug-row" style="margin-top:4px">
      <span class="debug-key">candidates</span> <span class="debug-tag">${d.candidateCount}</span>
      &nbsp;<span class="debug-key">top chunks</span> ${chunks}
    </div>`;
}

// ── File upload ────────────────────────────────────────────────────────────
const dropZone  = document.getElementById('drop-zone');
const fileInput = document.getElementById('file-input');

dropZone.addEventListener('dragover',  e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
dropZone.addEventListener('dragleave', ()  => dropZone.classList.remove('drag-over'));
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('drag-over');
  if (e.dataTransfer.files[0]) uploadFile(e.dataTransfer.files[0]);
});
fileInput.addEventListener('change', () => {
  if (fileInput.files[0]) uploadFile(fileInput.files[0]);
  fileInput.value = '';
});

async function uploadFile(file) {
  if (!file.name.toLowerCase().endsWith('.pdf')) { showToast('Only PDF files are supported', true); return; }
  document.getElementById('progress-wrap').classList.add('visible');
  setProgress(0, 'Uploading…');
  const form = new FormData();
  form.append('file', file);
  try {
    const res = await fetch('/api/upload', { method: 'POST', body: form });
    if (!res.ok) { showToast(await res.text() || 'Upload failed', true); document.getElementById('progress-wrap').classList.remove('visible'); return; }
    pollProgress(file.name);
  } catch { showToast('Upload failed — is the server running?', true); document.getElementById('progress-wrap').classList.remove('visible'); }
}

function pollProgress(fileName) {
  if (progressPoller) clearInterval(progressPoller);
  progressPoller = setInterval(async () => {
    try {
      const data = await (await fetch(`/api/progress?file=${encodeURIComponent(fileName)}`)).json();
      if (data.status === 'processing') {
        setProgress(data.progress, data.progress < 10 ? 'Parsing PDF…' : 'Embedding chunks…');
      } else if (data.status === 'done') {
        clearInterval(progressPoller);
        setProgress(100, 'Done');
        setTimeout(async () => {
          document.getElementById('progress-wrap').classList.remove('visible');
          await fetchDocuments();
          // Auto-open the new doc in the viewer
          const newDoc = documents.find(d => d.filename === fileName);
          if (newDoc) await openPdfTab(newDoc.id);
          showToast('Document ready — ask away!');
        }, 600);
      } else if (data.status === 'error') {
        clearInterval(progressPoller);
        document.getElementById('progress-wrap').classList.remove('visible');
        showToast('Ingestion error: ' + data.error, true);
      }
    } catch { /* server busy */ }
  }, 500);
}

function setProgress(pct, label) {
  document.getElementById('progress-fill').style.width    = pct + '%';
  document.getElementById('progress-pct').textContent     = pct + '%';
  document.getElementById('progress-status').textContent  = label;
}

// ── Chat ───────────────────────────────────────────────────────────────────
const chatInput  = document.getElementById('chat-input');
const sendBtn    = document.getElementById('send-btn');
const messages   = document.getElementById('messages');
const emptyState = document.getElementById('empty-state');

chatInput.addEventListener('keydown', e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } });
chatInput.addEventListener('input',   () => { chatInput.style.height = 'auto'; chatInput.style.height = Math.min(chatInput.scrollHeight, 130) + 'px'; });

function setInputEnabled(on) {
  chatInput.disabled = !on || isStreaming;
  sendBtn.disabled   = !on || isStreaming;
}

async function sendMessage() {
  const text = chatInput.value.trim();
  if (!text || isStreaming || !documents.length) return;

  emptyState.classList.add('hidden');
  appendMessage('user', text);
  chatInput.value = '';
  chatInput.style.height = 'auto';

  const assistantEl = appendMessage('assistant', null);
  isStreaming = true;
  setInputEnabled(false);

  try {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: text })
    });

    if (!res.ok) { finishMessage(assistantEl, 'Error: ' + await res.text(), []); return; }

    const reader  = res.body.getReader();
    const decoder = new TextDecoder();
    let   buffer  = '';
    let   content = '';
    let   sources = [];
    let   started = false;

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop();

      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        try {
          const evt = JSON.parse(line.slice(6));
          if (evt.type === 'debug') {
            renderDebug(evt);
            const kws = [...(evt.keywords || []), ...(evt.variants || [])].slice(0, 4).join(', ');
            const label = evt.candidateCount > 0
              ? `Ranking ${evt.candidateCount} chunks${kws ? ' · ' + kws : ''}…`
              : 'No keyword matches — sampling documents…';
            updateThinkingStatus(assistantEl, label);
          } else if (evt.type === 'meta') {
            sources = evt.sources || [];
            updateThinkingStatus(assistantEl, 'Generating response…');
          } else if (evt.type === 'token') {
            if (!started) { clearThinking(assistantEl); started = true; }
            content += evt.value;
            updateMessageContent(assistantEl, content);
          } else if (evt.type === 'done') {
            finishMessage(assistantEl, content, sources);
          }
        } catch { /* skip */ }
      }
    }
    if (!started) finishMessage(assistantEl, 'No response received.', []);
  } catch (err) {
    finishMessage(assistantEl, 'Connection error: ' + err.message, []);
  } finally {
    isStreaming = false;
    setInputEnabled(documents.length > 0);
    chatInput.focus();
  }
}

// ── Message rendering ──────────────────────────────────────────────────────
function appendMessage(role, text) {
  const wrap    = document.createElement('div');
  wrap.className = `msg ${role}`;
  const avatar  = document.createElement('div');
  avatar.className  = 'msg-avatar';
  avatar.textContent = role === 'user' ? 'YOU' : 'AI';
  const body    = document.createElement('div');
  body.className = 'msg-body';
  const content = document.createElement('div');
  content.className = 'msg-content';
  content.innerHTML = text === null
    ? `<div class="thinking"><div class="dot-wrap"><span></span><span></span><span></span></div><span class="thinking-status">Searching documents…</span></div>`
    : escHtml(text);
  body.appendChild(content);
  wrap.appendChild(avatar);
  wrap.appendChild(body);
  messages.appendChild(wrap);
  messages.scrollTop = messages.scrollHeight;
  return wrap;
}

function clearThinking(wrap) { wrap.querySelector('.msg-content').innerHTML = ''; }

function updateThinkingStatus(wrap, text) {
  const el = wrap.querySelector('.thinking-status');
  if (el) el.textContent = text;
}

function updateMessageContent(wrap, text) {
  wrap.querySelector('.msg-content').innerHTML = renderText(text);
  messages.scrollTop = messages.scrollHeight;
}

function finishMessage(wrap, text, sources) {
  wrap.querySelector('.msg-content').innerHTML = renderText(text);

  // sources is already scoped per-message (local var in sendMessage).
  // Only render the annotation bar if this response actually used chunks.
  const srcs = sources || [];
  if (srcs.length) {
    const body      = wrap.querySelector('.msg-body');
    const sourcesEl = document.createElement('div');
    sourcesEl.className = 'msg-sources';

    srcs.forEach(s => {
      const tag = document.createElement('span');
      tag.className   = 'source-tag';
      tag.textContent = `(${s.index}) ${s.doc} — pg. ${s.page}`;
      tag.title       = 'Click to view in PDF panel';
      tag.onclick     = () => goToSource(s.docId, s.page, s.yStart, s.yEnd);
      sourcesEl.appendChild(tag);
    });

    body.appendChild(sourcesEl);

    // Auto-navigate to first source in the viewer
    goToSource(srcs[0].docId, srcs[0].page, srcs[0].yStart, srcs[0].yEnd);
  }

  messages.scrollTop = messages.scrollHeight;
}

function renderText(text) {
  return text
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    .replace(/`([^`]+)`/g, '<code style="font-family:var(--mono);background:var(--border);padding:1px 5px;border-radius:3px">$1</code>')
    .replace(/\n/g, '<br>');
}

function escHtml(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Toast ──────────────────────────────────────────────────────────────────
let toastTimer;
function showToast(msg, isErr = false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className   = 'show' + (isErr ? ' err' : '');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { t.className = ''; }, 3000);
}

// ── PDF panel resize handle ─────────────────────────────────────────────────
(function () {
  const resizer   = document.getElementById('pdf-resizer');
  const app       = document.getElementById('app');
  let   dragging  = false;

  resizer.addEventListener('mousedown', e => {
    dragging = true;
    resizer.classList.add('dragging');
    document.body.style.cursor     = 'col-resize';
    document.body.style.userSelect = 'none';
    e.preventDefault();
  });

  document.addEventListener('mousemove', e => {
    if (!dragging) return;
    const appRect = app.getBoundingClientRect();
    const newW    = Math.max(240, Math.min(900, appRect.right - e.clientX));
    app.style.gridTemplateColumns = `260px 1fr ${newW}px`;
  });

  document.addEventListener('mouseup', async () => {
    if (!dragging) return;
    dragging = false;
    resizer.classList.remove('dragging');
    document.body.style.cursor     = '';
    document.body.style.userSelect = '';
    // Re-render at the new size
    if (activePdfId) await renderPdf();
  });
})();

// Auto-refit PDF when the panel is resized (e.g. window resize)
(function () {
  let debounceTimer = null;
  const observer = new ResizeObserver(() => {
    if (!activePdfId) return;
    clearTimeout(debounceTimer);
    debounceTimer = setTimeout(() => renderPdf(), 120);
  });
  observer.observe(document.getElementById('pdf-scroll'));
})();

// ── Init ───────────────────────────────────────────────────────────────────
fetchDocuments();
</script>
